<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llamadeck</title>
<style>
  :root {
    --bg: #14110f; --panel: #1d1916; --line: #322b25;
    --text: #ece3d8; --dim: #9a8e80; --accent: #e0792b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr auto;
    background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header .brand { font-weight: 700; letter-spacing: .5px; }
  header .brand b { color: var(--accent); }
  header .stat { color: var(--dim); font-size: 12px; }
  header .stat span { color: var(--text); }
  #log { overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 760px; white-space: pre-wrap; word-wrap: break-word; }
  .msg .who { font-size: 11px; color: var(--dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .8px; }
  .msg.user .who { color: var(--accent); }
  .msg.assistant .body { border-left: 2px solid var(--line); padding-left: 12px; }
  footer { padding: 12px 16px; border-top: 1px solid var(--line); background: var(--panel); display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; height: 44px; padding: 11px 12px;
    background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 8px;
    font: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 0 20px; border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: #14110f; font: inherit; font-weight: 700;
  }
  button:disabled { opacity: .5; cursor: default; }
  .err { color: #e0573b; }
</style>
</head>
<body>
  <header>
    <div class="brand"><b>llama</b>deck</div>
    <div class="stat">запросов: <span id="s-req">0</span></div>
    <div class="stat">токенов: <span id="s-tok">0</span></div>
    <div class="stat">средн.: <span id="s-tps">0.0</span> ток/с</div>
    <div class="stat">аптайм: <span id="s-up">0</span>с</div>
  </header>

  <div id="log"></div>

  <footer>
    <textarea id="input" placeholder="Сообщение… (Enter — отправить, Shift+Enter — перенос)"></textarea>
    <button id="send">Отправить</button>
  </footer>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const history = [];

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = '<div class="who"></div><div class="body"></div>';
  el.querySelector('.who').textContent = role === 'user' ? 'вы' : 'модель';
  el.querySelector('.body').textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el.querySelector('.body');
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const out = addMsg('assistant', '');
  let acc = '';

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const events = buf.split('\n\n');
      buf = events.pop();
      for (const ev of events) {
        let isErr = false, data = '';
        for (const line of ev.split('\n')) {
          if (line.startsWith('event:') && line.includes('error')) isErr = true;
          if (line.startsWith('event:') && line.includes('done')) { /* конец */ }
          if (line.startsWith('data:')) data += line.slice(5).replace(/^ /, '');
        }
        if (isErr) { out.innerHTML = '<span class="err">Ошибка: ' + data + '</span>'; return; }
        if (data) { acc += data; out.textContent = acc; log.scrollTop = log.scrollHeight; }
      }
    }
    history.push({ role: 'assistant', content: acc });
  } catch (e) {
    out.innerHTML = '<span class="err">Ошибка: ' + e.message + '</span>';
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = send;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function pollStats() {
  try {
    const s = await (await fetch('/api/stats')).json();
    document.getElementById('s-req').textContent = s.requests;
    document.getElementById('s-tok').textContent = s.tokens;
    document.getElementById('s-tps').textContent = s.avg_tok_per_s.toFixed(1);
    document.getElementById('s-up').textContent = s.uptime_s;
  } catch (_) {}
}
setInterval(pollStats, 1000);
pollStats();
input.focus();
</script>
</body>
</html>
